# Example Secret for authentication.
# Generate bcrypt hashes with: go run ./cmd/mkpasswd <user> <password>
# in the original rgstr repository.
apiVersion: v1
kind: Secret
metadata:
  name: my-registry-auth
  namespace: default
type: Opaque
stringData:
  RGSTR_AUTH_SECRET: "change-me-in-production"
  RGSTR_USERS: "alice:$2a$10$REPLACE_WITH_BCRYPT_HASH"
