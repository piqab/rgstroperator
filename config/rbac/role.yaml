apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rgstroperator-manager-role
rules:
  # Registry CRD
  - apiGroups: ["registry.rgstr.io"]
    resources: ["registries"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["registry.rgstr.io"]
    resources: ["registries/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["registry.rgstr.io"]
    resources: ["registries/finalizers"]
    verbs: ["update"]
  # Deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # PVCs
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Secrets (read-only)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
